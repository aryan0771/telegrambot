<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mirror Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        dark: '#0f172a',
                        darker: '#020617',
                        card: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>

<body class="bg-darker text-gray-100 min-h-screen">

    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <div
                class="w-8 h-8 rounded-full bg-primary flex items-center justify-center font-bold text-white shadow-lg shadow-blue-500/50">
                TM
            </div>
            <h1 class="text-xl font-bold tracking-tight">Telegram Mirror</h1>
        </div>
        <div class="flex items-center gap-4">
            <div id="status-badge"
                class="px-3 py-1 rounded-full text-xs font-semibold bg-gray-500/20 text-gray-400 border border-gray-500/30">
                Checking Status...
            </div>
            <button id="toggle-bot-btn" onclick="toggleBot()"
                class="hidden px-4 py-2 rounded-lg font-medium text-sm transition-all duration-200">
                Start Mirroring
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 mt-4">

        <!-- Left Column -->
        <div class="lg:col-span-5 space-y-6">

            <!-- Configuration Card -->
            <div class="glass rounded-2xl p-6 shadow-xl relative overflow-hidden group">
                <div
                    class="absolute inset-0 bg-gradient-to-br from-blue-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity">
                </div>
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                        </path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    Configuration
                </h2>

                <form id="config-form" class="space-y-4 relative z-10" onsubmit="saveConfig(event)">
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1">API ID</label>
                        <input type="password" id="api_id" value="{{ config.API_ID }}"
                            class="w-full bg-dark/50 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
                            required>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1">API HASH</label>
                        <input type="password" id="api_hash" value="{{ config.API_HASH }}"
                            class="w-full bg-dark/50 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
                            required>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-400 mb-1">Source Channel ID</label>
                            <input type="text" id="source_channel" value="{{ config.SOURCE_CHANNEL }}"
                                class="w-full bg-dark/50 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-400 mb-1">Destination Channel ID</label>
                            <input type="text" id="destination_channel" value="{{ config.DESTINATION_CHANNEL }}"
                                class="w-full bg-dark/50 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors">
                        </div>
                    </div>
                    <button type="submit"
                        class="w-full bg-white/10 hover:bg-white/20 text-white font-medium py-2 rounded-lg text-sm transition-colors border border-white/10">
                        Save Configuration
                    </button>
                </form>
            </div>

            <!-- Login Card -->
            <div class="glass rounded-2xl p-6 shadow-xl relative overflow-hidden group">
                <div
                    class="absolute inset-0 bg-gradient-to-br from-green-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity">
                </div>
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                        </path>
                    </svg>
                    Telegram Authentication
                </h2>

                <div id="auth-status" class="mb-4 text-sm hidden relative z-10"></div>

                <!-- Step 1: Phone -->
                <div id="phone-section" class="space-y-4 relative z-10">
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1">Phone Number (with country
                            code)</label>
                        <input type="text" id="phone_number" placeholder="+1234567890"
                            class="w-full bg-dark/50 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition-colors">
                    </div>
                    <button onclick="sendCode()"
                        class="w-full bg-green-500 hover:bg-green-600 text-white font-medium py-2 rounded-lg text-sm transition-colors shadow-lg shadow-green-500/30">
                        Send OTP Code
                    </button>
                </div>

                <!-- Step 2: Code -->
                <div id="code-section" class="space-y-4 relative z-10 hidden mt-4 pt-4 border-t border-gray-700">
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1">Login Code</label>
                        <input type="text" id="login_code" placeholder="12345"
                            class="w-full bg-dark/50 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition-colors">
                    </div>
                    <div id="password-field" class="hidden">
                        <label class="block text-xs font-medium text-gray-400 mb-1">2FA Password (if enabled)</label>
                        <input type="password" id="login_password"
                            class="w-full bg-dark/50 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition-colors">
                    </div>
                    <button onclick="verifyCode()"
                        class="w-full bg-green-500 hover:bg-green-600 text-white font-medium py-2 rounded-lg text-sm transition-colors shadow-lg shadow-green-500/30">
                        Verify & Login
                    </button>
                </div>
            </div>

        </div>

        <!-- Right Column -->
        <div class="lg:col-span-7 space-y-6">

            <!-- Channels Card -->
            <div class="glass rounded-2xl shadow-xl flex flex-col h-[calc(100vh-140px)]">
                <div class="p-6 border-b border-gray-700 flex justify-between items-center bg-white/5 rounded-t-2xl">
                    <h2 class="text-lg font-semibold flex items-center gap-2">
                        <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z">
                            </path>
                        </svg>
                        Your Channels & Groups
                    </h2>
                    <button onclick="fetchChannels()"
                        class="text-xs bg-purple-500/20 text-purple-300 hover:bg-purple-500/40 px-3 py-1.5 rounded-lg font-medium transition-colors border border-purple-500/30">
                        Refresh List
                    </button>
                </div>

                <div class="p-4 bg-dark/30 border-b border-gray-700">
                    <input type="text" id="channel-search" onkeyup="filterChannels()" placeholder="Search channels..."
                        class="w-full bg-dark/80 border border-gray-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-colors">
                </div>

                <div class="flex-1 overflow-y-auto p-2" id="channels-list">
                    <div class="flex flex-col items-center justify-center h-full text-gray-500 space-y-3">
                        <svg class="w-12 h-12 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                            </path>
                        </svg>
                        <p class="text-sm">Log in and click Refresh to view channels</p>
                    </div>
                </div>
            </div>

        </div>

    </main>

    <script>
        let isAuthorized = false;
        let isRunning = false;

        async function updateStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                isAuthorized = data.is_authorized;
                isRunning = data.is_running;

                const badge = document.getElementById('status-badge');
                if (isAuthorized) {
                    document.getElementById('auth-status').innerHTML = `
                        <div class="flex justify-between items-center p-3 bg-green-500/20 border border-green-500/30 text-green-400 rounded-lg text-xs font-medium">
                            <span>✓ Successfully Authenticated</span>
                            <button onclick="logout()" class="px-2 py-1 bg-red-500/20 text-red-400 hover:bg-red-500/30 rounded border border-red-500/30 transition-colors">Log Out</button>
                        </div>
                    `;
                    document.getElementById('auth-status').classList.remove('hidden');
                    document.getElementById('phone-section').classList.add('hidden');
                    document.getElementById('code-section').classList.add('hidden');

                    if (isRunning) {
                        badge.className = 'px-3 py-1 rounded-full text-xs font-semibold bg-green-500/20 text-green-400 border border-green-500/30';
                        badge.innerText = 'Bot Running';
                    } else {
                        badge.className = 'px-3 py-1 rounded-full text-xs font-semibold bg-yellow-500/20 text-yellow-400 border border-yellow-500/30';
                        badge.innerText = 'Bot Stopped';
                    }

                    const toggleBtn = document.getElementById('toggle-bot-btn');
                    toggleBtn.classList.remove('hidden');
                    if (isRunning) {
                        toggleBtn.className = 'px-4 py-2 rounded-lg font-medium text-sm transition-all duration-200 bg-red-500/20 text-red-400 hover:bg-red-500/30 border border-red-500/30';
                        toggleBtn.innerText = 'Stop Mirroring';
                    } else {
                        toggleBtn.className = 'px-4 py-2 rounded-lg font-medium text-sm transition-all duration-200 bg-primary/20 text-primary hover:bg-primary/30 border border-primary/30';
                        toggleBtn.innerText = 'Start Mirroring';
                    }

                } else {
                    badge.className = 'px-3 py-1 rounded-full text-xs font-semibold bg-red-500/20 text-red-400 border border-red-500/30';
                    badge.innerText = 'Not Authenticated';
                    document.getElementById('phone-section').classList.remove('hidden');
                    document.getElementById('toggle-bot-btn').classList.add('hidden');
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function saveConfig(e) {
            e.preventDefault();
            const payload = {
                api_id: document.getElementById('api_id').value,
                api_hash: document.getElementById('api_hash').value,
                source_channel: document.getElementById('source_channel').value,
                destination_channel: document.getElementById('destination_channel').value,
            };

            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    alert('Configuration saved successfully!');
                    updateStatus();
                } else {
                    alert('Failed to save config.');
                }
            } catch (err) {
                alert('Error saving config.');
            }
        }

        async function sendCode() {
            const phone = document.getElementById('phone_number').value;
            if (!phone) return alert('Enter phone number');

            try {
                const res = await fetch('/api/login/send_code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                const data = await res.json();

                if (data.status === 'code_sent') {
                    document.getElementById('code-section').classList.remove('hidden');
                } else if (data.status === 'already_logged_in') {
                    alert('Already logged in!');
                    updateStatus();
                } else {
                    alert(data.detail || 'Error sending code');
                }
            } catch (err) {
                alert('Error connecting to server.');
            }
        }

        async function verifyCode() {
            const code = document.getElementById('login_code').value;
            const password = document.getElementById('login_password').value;
            if (!code) return alert('Enter code');

            try {
                const res = await fetch('/api/login/verify_code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, password })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    alert('Logged in successfully!');
                    await updateStatus();
                    fetchChannels();
                } else if (data.status === 'password_needed') {
                    document.getElementById('password-field').classList.remove('hidden');
                    alert('2FA Password required.');
                } else {
                    alert(data.detail || 'Verification failed');
                }
            } catch (err) {
                alert('Error verifying code.');
            }
        }

        async function logout() {
            if (!confirm("Are you sure you want to log out of your Telegram account?")) return;

            try {
                const res = await fetch('/api/logout', { method: 'POST' });
                if (res.ok) {
                    alert("Logged out successfully.");
                    updateStatus();
                    document.getElementById('channels-list').innerHTML = `
                        <div class="flex flex-col items-center justify-center h-full text-gray-500 space-y-3">
                            <svg class="w-12 h-12 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                            <p class="text-sm">Log in and click Refresh to view channels</p>
                        </div>
                    `;
                } else {
                    alert("Failed to log out.");
                }
            } catch (err) {
                alert("Error logging out.");
            }
        }

        async function toggleBot() {
            try {
                const res = await fetch('/api/bot/toggle', { method: 'POST' });
                if (res.ok) {
                    updateStatus();
                } else {
                    const data = await res.json();
                    alert(data.detail || 'Failed to toggle bot');
                }
            } catch (e) {
                alert('Error toggling bot');
            }
        }

        async function fetchChannels() {
            if (!isAuthorized) return alert('Must be logged in to fetch channels');

            const listDiv = document.getElementById('channels-list');
            listDiv.innerHTML = '<div class="flex justify-center p-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-purple-500"></div></div>';

            try {
                const res = await fetch('/api/channels');
                if (!res.ok) throw new Error('Failed to fetch');
                const data = await res.json();

                if (data.channels.length === 0) {
                    listDiv.innerHTML = '<div class="text-center p-8 text-gray-500">No channels found</div>';
                    return;
                }

                let html = '';
                data.channels.forEach(ch => {
                    html += `
                    <div onclick="navigator.clipboard.writeText('${ch.id}'); alert('Copied ID: ${ch.id}')" class="channel-item flex justify-between items-center p-3 hover:bg-white/5 rounded-lg transition-colors border border-transparent hover:border-gray-700/50 group cursor-pointer">
                        <div class="overflow-hidden pr-4">
                            <div class="font-medium text-sm text-gray-200 truncate">${ch.name}</div>
                            <div class="text-xs text-gray-500 font-mono mt-0.5">${ch.id}</div>
                        </div>
                        <button class="opacity-0 group-hover:opacity-100 bg-dark border border-gray-600 text-xs px-3 py-1.5 rounded transition-all hover:bg-gray-700 whitespace-nowrap">
                            Copy ID
                        </button>
                    </div>`;
                });
                listDiv.innerHTML = html;
            } catch (e) {
                listDiv.innerHTML = '<div class="text-center p-8 text-red-400">Error fetching channels</div>';
            }
        }

        function filterChannels() {
            const query = document.getElementById('channel-search').value.toLowerCase();
            const items = document.querySelectorAll('.channel-item');
            items.forEach(item => {
                const text = item.innerText.toLowerCase();
                if (text.includes(query)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // Init
        updateStatus();
    </script>
</body>

</html>
